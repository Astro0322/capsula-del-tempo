<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Per Te 🌌</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        
        <header>
            <h1 id="main-title">Capsula del Tempo</h1>
            <p class="subtitle">Amore MIO! Ti dedico un piccolo pensiero ogni giorno, fino al tuo compleanno!</p>
        </header>

        <main>
            <div id="countdown-section">
                <p class="countdown-label">Mancano</p>
                <div id="countdown-display">-- giorni</div>
                <p class="countdown-label">al gran giorno</p>
            </div>

            <div id="daily-action-section">
                <button id="open-gift-btn">Apri il regalo di oggi</button>
                <p id="daily-message" class="hidden">Il messaggio apparirà qui...</p>
            </div>
        </main>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
